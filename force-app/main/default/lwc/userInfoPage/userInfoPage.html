<template>
    <lightning-card title="Мій профіль" icon-name="standard:user">
        
        <div class="slds-p-around_medium">
            <template if:true={clientData}>
                <div class="slds-grid slds-wrap slds-gutters">
                    
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                        <p class="slds-text-title_caps slds-text-color_weak">Ім'я та Прізвище</p>
                        <p class="slds-text-heading_small">{clientData.Name}</p>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                        <p class="slds-text-title_caps slds-text-color_weak">Контактний Email</p>
                        <p class="slds-text-heading_small">{clientData.Contact_Email__c}</p>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                        <p class="slds-text-title_caps slds-text-color_weak">Номер телефону</p>
                        <p class="slds-text-heading_small">
                            <template if:true={clientData.Contact_Phone__c}>
                                {clientData.Contact_Phone__c}
                            </template>
                            <template if:false={clientData.Contact_Phone__c}>
                                <span class="slds-text-color_weak">Не вказано</span>
                            </template>
                        </p>
                    </div>

                </div>
            </template>

            <template if:true={error}>
                <div class="slds-text-color_error">
                    Помилка: {error}
                </div>
            </template>
        </div>

    </lightning-card>
</template>
