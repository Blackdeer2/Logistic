<template>
    <lightning-card title="Оформлення замовлення" icon-name="standard:shipment">
        <div class="slds-p-around_medium">
            
            <h3 class="slds-section-title--divider slds-m-bottom_small slds-theme_shade">📦 Параметри вантажу</h3>
            <div class="slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input type="number" label="Вага (кг)" data-id="weight" step="0.1" required></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input type="number" label="Об'єм (м³)" data-id="volume" step="0.1" required></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                    <lightning-textarea label="Детальний опис вантажу" data-id="cargoDesc"></lightning-textarea>
                </div>
            </div>

            <h3 class="slds-section-title--divider slds-m-top_small slds-m-bottom_small slds-theme_shade">📍 Маршрут та Дати</h3>
            <div class="slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input label="Звідки (Місце завантаження)" data-id="pickUp" required></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input label="Куди (Місце доставки)" data-id="delivery" required></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input type="date" label="Дата відправки" data-id="startDate" required></lightning-input>
                </div>
            </div>

            <div class="slds-m-top_large slds-text-align_center">
                <lightning-button label="Підтвердити замовлення" variant="brand" onclick={handleCreateOrder}></lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
